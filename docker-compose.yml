services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stefanini_sqlserver
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -No 2>/dev/null || exit 1" ]
      interval: 10s
      retries: 10
      timeout: 5s
    networks:
      - stefanini_net

  stefaninipedido.api:
    image: ${DOCKER_REGISTRY-}stefaninipedidoapi
    build:
      context: .
      dockerfile: StefaniniPedido.API/Dockerfile
    container_name: stefanini_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=StefaniniPedidoDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
    ports:
      - "5000:80"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - stefanini_net

  client-angular:
    build:
      context: .
      dockerfile: clients/pedido-angular/Dockerfile
    container_name: stefanini_angular
    ports:
      - "4200:80"
    depends_on:
      - stefaninipedido.api
    networks:
      - stefanini_net
    labels:
      com.microsoft.visualstudio.debuggee: "false"

  client-react:
    build:
      context: .
      dockerfile: clients/pedido-react/Dockerfile
    container_name: stefanini_react
    ports:
      - "3002:80"
    depends_on:
      - stefaninipedido.api
    networks:
      - stefanini_net
    labels:
      com.microsoft.visualstudio.debuggee: "false"

volumes:
  sqlserver_data:
    name: stefanini_sqlserver_data


networks:
  stefanini_net:
    driver: bridge
